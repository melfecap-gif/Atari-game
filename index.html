<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro GP - Atari Style</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay" class="screen">
            <h1 class="glitch">RETRO GP</h1>
            <div class="controls-info">
                <p>CONTROLES:</p>
                <ul>
                    <li><span>W</span> - ACELERAR</li>
                    <li><span>S</span> - FREAR</li>
                    <li><span>A</span> - ESQUERDA</li>
                    <li><span>D</span> - DIREITA</li>
                    <li><span>ENTER</span> - START</li>
                </ul>
            </div>
            <p class="blink">PRESSIONE ENTER PARA COMECAR</p>
        </div>

        <div id="game-over" class="screen hidden">
            <h1>FIM DE JOGO</h1>
            <p id="final-score">TEMPO: 00:00</p>
            <p class="blink">PRESSIONE ENTER PARA REINICIAR</p>
        </div>

        <div id="hud" class="hidden">
            <div class="stat">TEMPO: <span id="timer">00:00</span></div>
            <div class="stat">VEL: <span id="speed">0</span> MPH</div>
        </div>

        <div id="minimap" class="hidden">
            <div id="map-player"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
