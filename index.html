<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro GP - Atari Pseudo-3D</title>
    <meta name="description" content="Um jogo de corrida pseudo-3D inspirado no clássico Atari Grand Prix.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="hud">
                <div class="stat">TEMPO: <span id="time">00:00</span></div>
                <div class="stat">VELOCIDADE: <span id="speed">0</span> KM/H</div>
            </div>
            <div id="start-screen" class="overlay">
                <h1>RETRO GP</h1>
                <p>USE AS SETAS PARA DIRIGIR</p>
                <button id="start-btn">INICIAR CORRIDA</button>
            </div>
            <div id="game-over" class="overlay hidden">
                <h1>FIM DE JOGO</h1>
                <p>SEU TEMPO: <span id="final-time">00:00</span></p>
                <button id="restart-btn">RECOMEÇAR</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="main.js"></script>
</body>
</html>
